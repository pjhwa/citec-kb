name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: unit-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-ci.txt

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}/apps/api
          APP_ENV: test
          AUTH_MODE: off
          # Avoid accidental live DB/Redis during pure unit tests
          DATABASE_URL: postgresql+psycopg://citec:citec@127.0.0.1:1/citec_knowledge
          REDIS_URL: redis://127.0.0.1:1/0
        run: |
          python -m pytest tests -q --tb=line \
            --ignore=tests/test_mock_idp_e2e.py
        # mock IdP e2e imports full FastAPI app stack with heavy routers;
        # auth/oidc/fusion/planner unit tests still cover core logic.

  signoff-script-syntax:
    name: signoff-script-syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile pilot scripts
        run: |
          python -m py_compile scripts/pilot_domain_signoff.py
          python -m py_compile scripts/pilot_tech_check.py
          python -m py_compile scripts/load_sla_report.py
