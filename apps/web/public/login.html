<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Login — CI-TEC Knowledge</title>
<style>
  :root { --bg:#f6f8fb; --card:#fff; --text:#0f172a; --muted:#64748b; --primary:#1d4ed8; --border:#e2e8f0; --ok:#047857; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, "Noto Sans KR", sans-serif; background:var(--bg); color:var(--text); }
  .top { background:#fff; border-bottom:1px solid var(--border); padding:12px 20px; display:flex; gap:16px; flex-wrap:wrap; }
  .top a { color:var(--primary); text-decoration:none; font-weight:600; font-size:14px; }
  .wrap { max-width:560px; margin:0 auto; padding:28px 16px 60px; }
  h1 { font-size:1.35rem; margin:0 0 8px; }
  .sub { color:var(--muted); font-size:13px; margin-bottom:16px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:12px; }
  input { width:100%; border:1px solid var(--border); border-radius:10px; padding:10px 12px; font-size:14px; margin:6px 0; }
  button { background:var(--primary); color:#fff; border:0; border-radius:10px; padding:10px 14px; font-weight:700; cursor:pointer; margin:4px 4px 4px 0; }
  button.ghost { background:#fff; color:var(--primary); border:1px solid var(--border); }
  .meta { color:var(--muted); font-size:12px; }
  .ok { color:var(--ok); font-weight:700; }
  pre { background:#f8fafc; border-radius:8px; padding:10px; font-size:12px; overflow:auto; border:1px solid var(--border); }
</style>
</head>
<body>
<div class="top">
  <a href="/">홈</a>
  <a href="/search.html">검색</a>
  <a href="/insights.html">Insight</a>
  <a href="/login.html">Login</a>
  <a href="/docs/">문서</a>
</div>
<div class="wrap">
  <h1>로그인 / SSO</h1>
  <p class="sub">OIDC authorization-code · local JWT (dev) · API key. 토큰은 localStorage에 저장됩니다.</p>

  <div class="card">
    <strong>상태</strong>
    <pre id="status">로딩…</pre>
    <button type="button" id="btnOidc">OIDC 로그인 (IdP)</button>
    <button type="button" class="ghost" id="btnRefresh">상태 새로고침</button>
    <button type="button" class="ghost" id="btnLogout">로그아웃</button>
  </div>

  <div class="card">
    <strong>Dev JWT mint</strong>
    <p class="meta">OIDC_JWT_SECRET 설정 시 · APP_ENV=dev</p>
    <input id="devSub" value="dev-senior" placeholder="sub"/>
    <input id="devName" value="Dev Senior" placeholder="name"/>
    <input id="devRoles" value="viewer,author,senior" placeholder="roles csv"/>
    <button type="button" id="btnDev">발급 + 저장</button>
  </div>

  <div class="card">
    <strong>수동 Bearer / API key</strong>
    <input id="manualTok" placeholder="access token or API key"/>
    <button type="button" id="btnSave">저장</button>
    <button type="button" class="ghost" id="btnMe">/v1/auth/me</button>
    <pre id="me" class="meta">—</pre>
  </div>
</div>
<script>
const KEY = "citec_kb_token";
const $ = (id) => document.getElementById(id);

function saveToken(t) {
  if (t) localStorage.setItem(KEY, t);
  else localStorage.removeItem(KEY);
}
function getToken() { return localStorage.getItem(KEY) || ""; }

// Capture OIDC callback fragment
(function captureFragment() {
  const h = location.hash.replace(/^#/, "");
  if (!h) return;
  const p = new URLSearchParams(h);
  const tok = p.get("access_token") || p.get("id_token");
  if (tok) {
    saveToken(tok);
    history.replaceState(null, "", location.pathname);
  }
})();

async function loadStatus() {
  const r = await fetch("/v1/auth/status");
  const d = await r.json();
  $("status").textContent = JSON.stringify(d, null, 2);
}

async function me() {
  const headers = {};
  const t = getToken();
  if (t) headers["Authorization"] = "Bearer " + t;
  const r = await fetch("/v1/auth/me", {headers});
  const d = await r.json();
  $("me").textContent = JSON.stringify(d, null, 2);
}

$("btnRefresh").onclick = () => loadStatus().catch(e => $("status").textContent = String(e));
$("btnOidc").onclick = () => {
  // return_to this page (absolute path)
  location.href = "/v1/auth/login?return_to=" + encodeURIComponent("/login.html");
};
$("btnLogout").onclick = () => {
  saveToken(null);
  location.href = "/v1/auth/logout";
};
$("btnSave").onclick = () => { saveToken($("manualTok").value.trim()); me(); };
$("btnMe").onclick = () => me().catch(e => $("me").textContent = String(e));
$("btnDev").onclick = async () => {
  const body = {
    sub: $("devSub").value.trim() || "dev-user",
    name: $("devName").value.trim() || "Dev",
    roles: $("devRoles").value.split(",").map(s => s.trim()).filter(Boolean),
  };
  const r = await fetch("/v1/auth/dev/token", {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body)});
  const d = await r.json();
  if (!r.ok) { $("me").textContent = JSON.stringify(d, null, 2); return; }
  saveToken(d.access_token);
  $("manualTok").value = d.access_token;
  $("me").innerHTML = '<span class="ok">token saved</span>\n' + JSON.stringify(d.principal, null, 2);
};
loadStatus();
if (getToken()) { $("manualTok").value = getToken(); me(); }
</script>
</body>
</html>
