# CI-TEC Knowledge Platform — slim stack (PR-01)
# Host ports restricted to 8572–8580 (org allocation)
# Services: web, api, worker, postgres, redis
# LLM is external (OpenRouter on dev, Fabrix on prod)

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-citec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-citec}
      POSTGRES_DB: ${POSTGRES_DB:-citec_knowledge}
    ports:
      - "8574:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-citec} -d ${POSTGRES_DB:-citec_knowledge}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "8575:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-citec}:${POSTGRES_PASSWORD:-citec}@postgres:5432/${POSTGRES_DB:-citec_knowledge}
      REDIS_URL: redis://redis:6379/0
      RAW_DIR: /data/raw
      HF_HOME: /models
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-0}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-intfloat/multilingual-e5-base}
      # Pilot default: auth off (no Bearer required). Enable later via .env override only if intentional.
      AUTH_MODE: ${AUTH_MODE:-off}
      MOCK_OIDC_ENABLED: ${MOCK_OIDC_ENABLED:-false}
    ports:
      - "8573:8000"
    volumes:
      - ./config:/app/config:ro
      # RW: bundle/lexicon/capacity seed writes (POST /v1/bundles, /v1/lexicon/seed)
      - ./data:/app/data
      # Dev: live-reload API source without rebuild
      - ./apps/api/app:/app/app
      # Knowledge corpus (registered under data/raw)
      - ${RAW_HOST_DIR:-./data/raw}:/data/raw:ro
      - ${MODELS_HOST_DIR:-/home/citec/tmp/citec-wiki-qa/models}:/models:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-citec}:${POSTGRES_PASSWORD:-citec}@postgres:5432/${POSTGRES_DB:-citec_knowledge}
      REDIS_URL: redis://redis:6379/0
      RAW_DIR: /data/raw
      API_BASE_URL: http://api:8000
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data:ro
      - ${RAW_HOST_DIR:-./data/raw}:/data/raw:ro
      # Dev: live worker code without rebuild
      - ./apps/worker/app:/app/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: nginx:1.27-alpine
    ports:
      - "8572:80"
    volumes:
      - ./apps/web/public:/usr/share/nginx/html:ro
      - ./apps/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # Optional local IdP: docker compose --profile keycloak up -d keycloak
  # Host: http://localhost:8576  · Realm: citec  · Client: citec-kb / citec-kb-secret
  keycloak:
    profiles: ["keycloak"]
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: "8576"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    ports:
      - "8576:8080"
    volumes:
      - ./deploy/keycloak/realm-citec.json:/opt/keycloak/data/import/realm-citec.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s
    restart: unless-stopped

volumes:
  pgdata:
